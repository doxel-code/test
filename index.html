<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Substrate Style Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0a0a0c; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; }
        .content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1 id="main-title" class="text-white text-5xl md:text-7xl font-light tracking-[0.2em] opacity-0">
            FLUXION<span class="text-blue-500">_</span>
        </h1>
        <p id="sub-text" class="text-zinc-500 mt-4 tracking-[0.5em] text-xs uppercase opacity-0">
            Precision / Intelligence / Vision
        </p>
    </div>

    <script>
        // --- 1. CONFIGURATION THREE.JS (Le fond de particules) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Création des particules
        const particlesGeometry = new THREE.BufferGeometry();
        const count = 3000;
        const positions = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.015,
            color: 0x555555,
            transparent: true,
            opacity: 0.8
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        camera.position.z = 3;

        // --- 2. ANIMATION DU FOND ---
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth) - 0.5;
            const mouseY = (e.clientY / window.innerHeight) - 0.5;
            gsap.to(particlesMesh.rotation, {
                y: mouseX * 0.5,
                x: -mouseY * 0.5,
                duration: 2
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // --- 3. ANIMATION DU TEXTE (Style Substrate) ---
        const tl = gsap.timeline();
        tl.to("#main-title", { opacity: 1, duration: 2, ease: "expo.out" })
          .to("#sub-text", { opacity: 1, duration: 1.5, y: -10, ease: "power2.out" }, "-=1");

    </script>
</body>
</html>
